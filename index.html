<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>💪 IRON TRACK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;--s1:#111116;--s2:#18181f;--s3:#22222c;--border:#2c2c3a;
  --accent:#c8ff00;--red:#ff3d5a;--blue:#3eb8ff;--gold:#ffb800;--green:#00e676;--purple:#b57bee;
  --push-a:#ff5c5c;--pull-a:#3eb8ff;--legs:#ffc300;--push-b:#ff8c42;--abs:#b57bee;
  --text:#eeeef5;--muted:#666680;--r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.view{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}
.view::-webkit-scrollbar{display:none}
/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,12,.96);
  border-top:1px solid var(--border);display:flex;
  padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 0;border:none;background:none;cursor:pointer;color:var(--muted);
  font-size:9px;font-weight:700;letter-spacing:.8px;font-family:'DM Sans';text-transform:uppercase}
.nb .i{font-size:19px;line-height:1}
.nb.on{color:var(--accent)}
/* SHARED */
.ph{padding:18px 18px 0;display:flex;align-items:center;justify-content:space-between}
.pt{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--accent);line-height:1}
.ps{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.sec{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:14px 18px 8px}
.btn{padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;
  font-family:'DM Sans';cursor:pointer;display:block;width:100%;text-align:center}
.btn-y{background:var(--accent);color:#000}
.btn-g{background:var(--s2);border:1.5px solid var(--border);color:var(--text)}
input,textarea{font-family:'DM Sans';background:var(--s2);border:1.5px solid var(--border);
  color:var(--text);border-radius:10px;font-size:14px;padding:9px 11px;width:100%}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:up .2s ease both}
/* DASH */
.hero{margin:14px 18px 0;border-radius:var(--r);background:linear-gradient(135deg,#1a2a00,#0a1800);
  border:1.5px solid #c8ff0030;padding:18px;position:relative;overflow:hidden}
.hero:before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 0,#c8ff0015,transparent 60%)}
.pbg{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:10px}
.pbf{height:100%;background:linear-gradient(90deg,var(--accent),#80ff00);border-radius:3px;transition:width .5s}
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 18px 0}
.sb{background:var(--s1);border:1.5px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.sv{font-family:'Bebas Neue';font-size:26px;color:var(--accent);line-height:1}
.sl{font-size:10px;color:var(--muted);font-weight:700;margin-top:1px}
.card{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin:10px 18px 0}
/* WEEK SCHEDULE */
.dr{display:flex;align-items:center;gap:10px;padding:9px 13px;
  background:var(--s1);border:1.5px solid var(--border);border-radius:11px}
.dr.today{border-color:var(--accent);background:#c8ff0008}
.dd{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
/* TRAIN */
.wscr{display:flex;gap:5px;overflow-x:auto;padding:10px 18px;scrollbar-width:none}
.wscr::-webkit-scrollbar{display:none}
.wk{flex-shrink:0;width:42px;height:42px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--s1);color:var(--muted);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative}
.wk.on{background:var(--accent);border-color:var(--accent);color:#000;transform:scale(1.07)}
.wk.cur:after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--red)}
.wk.hd{border-color:#c8ff0055;color:var(--accent)}
.wk.hd.on{color:#000}
.stabs{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:0 18px}
.stab{padding:8px 3px;border-radius:10px;border:1.5px solid var(--border);background:var(--s1);
  font-size:9px;font-weight:700;cursor:pointer;text-align:center;color:var(--muted);transition:all .15s}
.stab .dot{width:6px;height:6px;border-radius:50%;background:var(--c,var(--muted));margin:0 auto 3px}
.stab.on{background:var(--c);border-color:var(--c);color:#000}
/* EX CARDS */
.exlist{padding:10px 18px 0;display:flex;flex-direction:column;gap:8px}
.exc{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.exc.done{border-color:#00e67640;opacity:.8}
.exc.open{border-color:var(--accent)}
.exh{padding:12px 13px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;user-select:none}
.exn{width:24px;height:24px;border-radius:6px;background:var(--s3);display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;margin-top:1px}
.done .exn{background:var(--green);color:#000}
.exi{flex:1;min-width:0}
.exname{font-size:13px;font-weight:700;line-height:1.2}
.exmeta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:7px;flex-wrap:wrap}
.excol{text-align:right;flex-shrink:0;min-width:65px}
.exb{display:none;padding:0 13px 13px}
.exc.open .exb{display:block}
/* SETS */
.erow{display:flex;gap:6px;margin-bottom:8px}
.erow input{flex:1;font-size:13px;padding:7px 8px}
.erow button{padding:7px 11px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--s3);color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'DM Sans'}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:8px}
@media(min-width:380px){.sgrid{grid-template-columns:repeat(4,1fr)}}
.sbox{background:var(--s2);border:1.5px solid var(--border);border-radius:9px;padding:7px 4px;text-align:center;transition:border-color .2s}
.sbox.ok{border-color:#00e67660;background:#00e67608}
.sbox label{font-size:9px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px}
.sr2{display:flex;gap:3px}
.sr2 input{background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:12px;font-weight:700;text-align:center;padding:5px 2px}
.sr2 input:focus{border-color:var(--accent)}
.slim{font-size:9px;color:var(--s3);display:flex;gap:3px;margin-top:2px}
.slim span{flex:1;text-align:center;color:var(--muted)}
.notea{width:100%;resize:none;height:42px;font-size:12px;margin-bottom:8px;background:var(--bg)}
.dtog{width:100%;padding:10px;border-radius:9px;border:1.5px solid var(--border);
  background:var(--s2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans';text-align:center}
.dtog.done{background:#00e67618;border-color:#00e67660;color:var(--green)}
.padv{background:var(--s2);border:1px solid var(--border);border-radius:9px;
  padding:9px 11px;margin-bottom:8px;display:flex;gap:8px;font-size:12px;color:var(--muted)}
.padv strong{color:var(--text);display:block;font-size:12px;margin-bottom:1px}
/* EDIT ROW */
.editrow{display:flex;gap:7px;align-items:center;margin-bottom:9px}
.editrow label{font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap}
.editrow input{font-size:13px;font-weight:700;text-align:center;padding:6px 4px}
/* REPLACE */
.rpanel{display:none;background:var(--s2);border-radius:10px;padding:10px;margin-bottom:9px}
.rpanel input{margin-bottom:7px;font-size:13px}
.rpanel .rlist{max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.rpanel .ritem{padding:8px 11px;background:var(--s1);border:1px solid var(--border);
  border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.rpanel .ritem:active{border-color:var(--accent)}
/* CARDIO TIMER */
.ctimer{font-family:'Bebas Neue';font-size:48px;color:var(--accent);text-align:center;line-height:1;margin:8px 0}
.cbtns{display:flex;gap:7px;margin-top:8px}
.cbtns button{flex:1;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans'}
/* CORPS */
.bform{margin:10px 18px 0;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fr.c3{grid-template-columns:repeat(3,1fr)}
.ff{display:flex;flex-direction:column;gap:4px}
.ff label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase}
.bts{margin:10px 18px 0;overflow-x:auto}
.bt{border-collapse:collapse;width:100%;min-width:440px}
.bt th{background:var(--s2);padding:7px 9px;font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;text-align:center;border-bottom:1px solid var(--border)}
.bt td{padding:7px 9px;font-size:11px;text-align:center;border-bottom:1px solid var(--s2)}
.bt tr:nth-child(even) td{background:var(--s1)}
.dp{color:var(--green);font-weight:700}.dn{color:var(--red);font-weight:700}.dz{color:var(--muted)}
/* NUTRITION */
.dtog2{display:flex;gap:7px;padding:10px 18px 0}
.dtog2 button{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--s1);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans'}
.dtog2 button.on{background:var(--accent);border-color:var(--accent);color:#000}
.mbars{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 18px 0}
.mbar{background:var(--s1);border:1.5px solid var(--border);border-radius:12px;padding:9px 5px;text-align:center}
.mv{font-family:'Bebas Neue';font-size:17px;line-height:1}
.ml{font-size:9px;font-weight:700;color:var(--muted);margin-top:1px}
.mpb{height:3px;border-radius:2px;background:var(--s3);margin-top:4px;overflow:hidden}
.mpf{height:100%;border-radius:2px;transition:width .3s}
.fbuilder{margin:10px 18px 0;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:14px}
.fsw{position:relative;margin-bottom:9px}
.fsw input{padding-right:36px}
.fsc{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:3px}
.fres{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.fri{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--s2);
  border:1px solid var(--border);border-radius:8px;cursor:pointer}
.fri:active{border-color:var(--accent)}
.fri .fn{flex:1;font-size:12px;font-weight:600;line-height:1.3}
.fri .fb{font-size:10px;color:var(--muted);margin-top:1px}
.fri .fm{font-size:10px;color:var(--muted);text-align:right;line-height:1.5;flex-shrink:0}
.src{font-size:9px;padding:2px 5px;border-radius:99px;background:#ff571520;color:#ff8844;
  border:1px solid #ff571530;font-weight:700;margin-left:5px}
.afform{background:var(--s2);border:1px solid var(--accent);border-radius:9px;padding:11px;margin-bottom:9px}
.afn{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px}
.afm{font-size:11px;color:var(--muted);margin-bottom:7px;line-height:1.5}
.afrow{display:flex;align-items:center;gap:7px}
.afrow input{flex:1;padding:7px 9px;font-size:14px}
.afrow .afu{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
.afrow button{padding:8px 13px;border-radius:8px;border:none;background:var(--accent);
  color:#000;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans';white-space:nowrap}
.qrow{display:flex;gap:5px;flex-wrap:wrap}
.qchip{padding:5px 10px;border-radius:99px;border:1px solid var(--border);
  background:var(--s2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer}
.qchip:active{border-color:var(--accent);color:var(--accent)}
.mlog{margin:10px 18px 0;display:flex;flex-direction:column;gap:6px}
.mli{display:flex;align-items:center;gap:9px;padding:9px 13px;
  background:var(--s1);border:1.5px solid var(--border);border-radius:11px}
.mli .mn{flex:1;font-size:12px;font-weight:600}
.mli .mq{font-size:11px;color:var(--muted);margin-right:3px}
.mli .mm{text-align:right;font-size:10px;line-height:1.5}
.mli .md{background:none;border:none;color:var(--red);font-size:15px;cursor:pointer;padding:3px;flex-shrink:0}
.suplist{padding:0 18px;display:flex;flex-direction:column;gap:7px}
.supi{display:flex;align-items:center;gap:11px;padding:11px 13px;
  background:var(--s1);border:1.5px solid var(--border);border-radius:11px}
.supi .si{font-size:20px}
.supi .sinf{flex:1}
.supi .sinf strong{font-size:12px;font-weight:700}
.supi .sinf span{font-size:10px;color:var(--muted);display:block;margin-top:1px}
.supi .sd{font-size:11px;font-weight:700;color:var(--accent)}
.rrow{display:flex;align-items:center;gap:11px;padding:9px 13px;
  background:var(--s1);border:1.5px solid var(--border);border-radius:11px}
.est{text-align:center;padding:36px 18px;color:var(--muted)}
.est .ei{font-size:36px;margin-bottom:8px}
.est p{font-size:12px;line-height:1.7}
/* TOAST & CONFETTI */
#cl{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.cp{position:absolute;border-radius:2px;animation:cf 1.2s ease-in forwards}
@keyframes cf{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--s2);border:1.5px solid var(--border);border-radius:11px;
  padding:9px 16px;font-size:12px;font-weight:700;z-index:500;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="cl"></div>
<div class="toast" id="toast"></div>
<div class="app">
  <div class="view" id="view"></div>
  <nav>
    <button class="nb on" data-p="dash" onclick="go('dash')"><span class="i">📊</span>BILAN</button>
    <button class="nb" data-p="train" onclick="go('train')"><span class="i">🏋️</span>SÉANCE</button>
    <button class="nb" data-p="body" onclick="go('body')"><span class="i">📏</span>CORPS</button>
    <button class="nb" data-p="nutri" onclick="go('nutri')"><span class="i">🍽️</span>NUTRI</button>
  </nav>
</div>

  'Curl incliné haltères','Shrugs barre','Squat barre','Squat hack','Leg press','Fentes haltères',
  'Fentes bulgares','Hip thrust barre','Soulevé de terre roumain','Leg curl couché','Leg extension',

  'Planche','Russian twist','Mountain climbers','Gainage dynamique',
];
// ── ALIMENTS (160+) ──
const FOODS=[
  // VIANDES
  {id:"v1",nm:"Blanc de poulet",           u:"g",   p:31,  g:0,   l:3.6,kc:165,cat:"🥩 Viandes"},
  {id:"v2",nm:"Cuisse de poulet",          u:"g",   p:19,  g:0,   l:9,  kc:160,cat:"🥩 Viandes"},

function getChg(sid,ei,week){
  const b=BEX[sid][ei];

  const w1=maxKg(sid,ei,1);
  if(w1){const m=week<=2?1:week<=6?1.05:week<=12?1.125:week<=18?1.20:1.30;return Math.round(w1*m/2.5)*2.5;}

  return b.base?Math.round(b.base*fm/2.5)*2.5:null;
}
function maxKg(sid,ei,week){

}

  const b=i<BEX[s].length?BEX[s][i]:null;
  const ns=b?b.s:3;
  if(!DB.tr[w][s][i])DB.tr[w][s][i]={nm:b?b.nm:"Exercice",sets:Array.from({length:ns},()=>({kg:"",reps:""})),done:false,note:"",sc:null,rt:null};
  return DB.tr[w][s][i];
}
function sessDone(w,s){return BEX[s].every((_,i)=>DB.tr[w]?.[s]?.[i]?.done);}
function totalSess(){return Object.values(DB.tr||{}).reduce((a,wk)=>a+SESS.filter(s=>sdwk(wk,s.id)).length,0);}
function sdwk(wk,sid){if(!wk||!wk[sid])return false;return BEX[sid].every((_,i)=>wk[sid][i]?.done);}
function getPRs(){
  const prs=[];
  SESS.filter(s=>s.id!=="abs").forEach(se=>{
    BEX[se.id].forEach((b,i)=>{if(b.bw||b.tm)return;const m=histMax(se.id,i,27);if(m)prs.push({nm:b.nm,kg:m});});
  });
  return prs.sort((a,b)=>b.kg-a.kg).slice(0,6);
}

// ── NUTRITION HELPERS ──
function todayK(){return new Date().toLocaleDateString("fr-FR");}
function getLog(){if(!DB.nlog)DB.nlog={};if(!DB.nlog[todayK()])DB.nlog[todayK()]=[];return DB.nlog[todayK()];}
function sumLog(log){let p=0,g=0,l=0,kc=0;log.forEach(e=>{p+=e.p;g+=e.g;l+=e.l;kc+=e.kc;});return{p:Math.round(p),g:Math.round(g),l:Math.round(l),kc:Math.round(kc)};}
function searchFoods(q){
  if(!q)return[];const lq=q.toLowerCase();
  return FOODS.filter(f=>f.nm.toLowerCase().includes(lq)).slice(0,15);
}

function tiStart(){if(tiR)return;tiR=true;tiI=setInterval(()=>{tiS++;const e=document.getElementById("ct");if(e)e.textContent=fmt(tiS);else{clearInterval(tiI);tiR=false;}},1000);}
function tiPause(){clearInterval(tiI);tiR=false;}
function tiReset(){clearInterval(tiI);tiR=false;tiS=0;const e=document.getElementById("ct");if(e)e.textContent="00:00";}
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}

function mkEx(container,i){
  const s=tS,w=tW;
  const base=i<BEX[s].length?BEX[s][i]:null;
  const exd=getExD(w,s,i);
  const isCustom=!base;
  const isTm=base&&base.tm;
  const isBW=base&&base.bw;
  const isW1=w===1&&!isCustom&&!isTm;
  const ns=exd.sc||(base?base.s:3);
  const rt=exd.rt||(base?base.r:"10");
  const charge=(!isCustom&&!isBW&&!isTm)?getChg(s,i,w):null;
  const prev=!isCustom?histMax(s,i,w):null;

  while(exd.sets.length<ns)exd.sets.push({kg:"",reps:""});

  let cdsp="";
  if(isTm)cdsp=`<div style="font-family:'Bebas Neue';font-size:18px;color:var(--purple)">${rt}</div><div style="font-size:9px;color:var(--muted);font-weight:700">DURÉE</div>`;
  else if(isW1)cdsp=`<div style="font-family:'Bebas Neue';font-size:13px;color:var(--muted)">À DÉCOUVRIR</div>`;
  else if(isBW)cdsp=`<div style="font-family:'Bebas Neue';font-size:17px;color:var(--muted)">PDC</div>`;
  else if(charge)cdsp=`<div style="font-family:'Bebas Neue';font-size:22px;color:var(--accent)">${charge}<span style="font-size:11px"> kg</span></div><div style="font-size:9px;color:var(--muted);font-weight:700">OBJECTIF</div>${prev?`<div style="font-size:9px;color:var(--green);font-weight:600;margin-top:1px">Record: ${prev}kg</div>`:""}`;
  else if(isCustom)cdsp=`<div style="font-family:'Bebas Neue';font-size:14px;color:var(--purple)">PERSO</div>`;

  let adv="";
  if(!isW1&&prev&&charge){
    const d=(charge-prev).toFixed(1);
    if(parseFloat(d)>0)adv=`<div class="padv"><div style="font-size:15px">🚀</div><div><strong>+${d}kg vs record</strong>Objectif ambitieux !</div></div>`;
    else if(parseFloat(d)===0)adv=`<div class="padv"><div style="font-size:15px">🎯</div><div><strong>Au niveau du record</strong>Vise toutes tes séries !</div></div>`;
  }

  const setsHtml=exd.sets.slice(0,ns).map((st,si)=>{
    if(isTm){
      const ok=st.reps!=="";
      return `<div class="sbox${ok?" ok":""}" id="sb-${i}-${si}"><label>SÉRIE ${si+1}</label>
        <div style="margin:4px 0"><input type="number" inputmode="numeric" placeholder="45" value="${st.reps}" oninput="setV(${i},${si},'reps',this.value)" style="text-align:center;font-size:12px;font-weight:700;padding:5px 3px"></div>
        <div style="font-size:9px;color:var(--muted);text-align:center">sec</div></div>`;
    }
    const ok=st.kg!=""&&st.reps!="";
    return `<div class="sbox${ok?" ok":""}" id="sb-${i}-${si}"><label>SÉRIE ${si+1}</label>
      <div class="sr2"><input type="number" inputmode="decimal" placeholder="kg" value="${st.kg}" oninput="setV(${i},${si},'kg',this.value)"><input type="number" inputmode="numeric" placeholder="reps" value="${st.reps}" oninput="setV(${i},${si},'reps',this.value)"></div>
      <div class="slim"><span>kg</span><span>reps</span></div></div>`;
  }).join("");

  const card=document.createElement("div");
  card.className=`exc${exd.done?" done":""}`;
  card.id=`ec-${i}`;
  card.innerHTML=`
  <div class="exh" onclick="togEx(${i})">
    <div class="exn" style="${isCustom?"background:var(--purple)22;color:var(--purple);border:1px solid var(--purple)44":""}">${exd.done?"✓":(isCustom?"★":i+1)}</div>
    <div class="exi"><div class="exname">${exd.nm}</div>
    <div class="exmeta"><span>📦 ${ns} séries</span><span>🎯 ${rt}</span>${isCustom?'<span style="color:var(--purple);font-weight:700">Perso</span>':""}</div></div>
    <div class="excol">${cdsp}</div>
  </div>
  <div class="exb" id="eb-${i}">
    <!-- REPLACE PANEL -->
    <div id="rp-${i}" class="rpanel">
      <input type="text" placeholder="Chercher un exercice..." oninput="filtR(${i},this.value)">
      <div class="rlist" id="rl-${i}"></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:9px">
      <button onclick="togRp(${i})" style="flex:1;padding:7px;border-radius:8px;border:1.5px solid var(--border);background:var(--s3);color:var(--text);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans'">🔄 Remplacer</button>
    </div>
    <!-- EDIT SERIES/REPS -->
    <div class="editrow">
      <label>SÉRIES</label>
      <input type="number" min="1" max="10" value="${ns}" inputmode="numeric" style="width:50px" onchange="setOvr(${i},'sets',this.value)">
      <label>REPS</label>
      <input type="text" value="${rt}" placeholder="10" style="flex:1" onchange="setOvr(${i},'reps',this.value)">
    </div>
    ${adv}
    <div class="sgrid" id="sg-${i}">${setsHtml}</div>
    <textarea class="notea" placeholder="Notes, ressenti..." onchange="setNote(${i},this.value)">${exd.note||""}</textarea>
    <button class="dtog${exd.done?" done":""}" id="dt-${i}" onclick="togDone(${i})">${exd.done?"✅ Terminé — touche pour annuler":"Marquer comme terminé"}</button>
  </div>`;
  if(document.getElementById(`ec-${i}`)){document.getElementById(`ec-${i}`).replaceWith(card);}
  else container.appendChild(card);
}

function togEx(i){const b=document.getElementById(`eb-${i}`);if(!b)return;const o=b.style.display==="block";b.style.display=o?"none":"block";document.getElementById(`ec-${i}`)?.classList.toggle("open",!o);}
function togRp(i){
  const p=document.getElementById(`rp-${i}`);if(!p)return;
  const o=p.style.display!=="none";p.style.display=o?"none":"block";
  if(!o){filtR(i,"");setTimeout(()=>p.querySelector("input")?.focus(),40);}
}
function filtR(i,q){
  const cont=document.getElementById(`rl-${i}`);if(!cont)return;
  const res=q?ALL_EX.filter(e=>e.toLowerCase().includes(q.toLowerCase())).slice(0,20):ALL_EX.slice(0,20);
  cont.innerHTML=res.map(e=>`<div class="ritem" onclick="doReplace(${i},'${e.replace(/'/g,"\\'")}')">${e}<span style="color:var(--accent);font-size:11px">→</span></div>`).join("");
}
function doReplace(i,nm){
  const d=getExD(tW,tS,i);
  d.nm=nm;d.sets=Array.from({length:d.sc||(i<BEX[tS].length?BEX[tS][i].s:3)},()=>({kg:"",reps:""}));d.done=false;
  save();
  const list=document.getElementById("exl");if(list)mkEx(list,i);
  const b=document.getElementById(`eb-${i}`);if(b){b.style.display="block";document.getElementById(`ec-${i}`)?.classList.add("open");}
  showToast("✓ Remplacé par "+nm);
}
function addEx(){
  const exs=BEX[tS];
  if(!DB.tr[tW])DB.tr[tW]={};
  if(!DB.tr[tW][tS])DB.tr[tW][tS]={};
  let ni=exs.length;
  while(DB.tr[tW][tS][ni])ni++;
  DB.tr[tW][tS][ni]={nm:"Nouvel exercice",sets:[{kg:"",reps:""},{kg:"",reps:""},{kg:"",reps:""}],done:false,note:"",sc:3,rt:"10"};
  save();
  const list=document.getElementById("exl");if(list)mkEx(list,ni);
  setTimeout(()=>{togEx(ni);togRp(ni);},40);
  showToast("✏️ Exo ajouté");
}
function setOvr(i,field,val){
  const d=getExD(tW,tS,i);
  if(field==="sets"){const n=parseInt(val);if(isNaN(n)||n<1||n>10)return;d.sc=n;while(d.sets.length<n)d.sets.push({kg:"",reps:""});d.sets=d.sets.slice(0,n);}
  else d.rt=val;

async function offSearch(q){
  const el=document.getElementById("fres");if(!el)return;
  try{
    const urls=[
      `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=20&fields=product_name,brands,nutriments&lc=fr`,
      `https://fr.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=20&fields=product_name,brands,nutriments`,
    ];
    let data=null;
    for(const url of urls){
      try{const r=await fetch(url,{signal:AbortSignal.timeout(9000)});if(r.ok){data=await r.json();if(data?.products?.length)break;}}catch(e){continue;}
    }
    if(!document.getElementById("fres"))return;
    if(!data?.products?.length){document.getElementById("fres").innerHTML=`<div style="text-align:center;padding:12px;color:var(--muted);font-size:11px">Aucun résultat OFF — utilise la base locale</div>`;return;}
    const prods=data.products.filter(p=>{const n=p.nutriments;return p.product_name&&n&&(n["energy-kcal_100g"]!==undefined||n.proteins_100g!==undefined);});
    document.getElementById("fres").innerHTML=prods.slice(0,12).map(p=>{
      const n=p.nutriments||{};
      const prot=Math.round((n.proteins_100g||0)*10)/10;
      const carb=Math.round((n.carbohydrates_100g||0)*10)/10;
      const fat=Math.round((n.fat_100g||0)*10)/10;
      const kcal=Math.round(n["energy-kcal_100g"]||(n.energy_100g||0)/4.184||0);
      if(kcal===0&&prot===0)return"";
      const brand=(p.brands||"").split(",")[0].trim();
      const nm=p.product_name.slice(0,45);
      const enc=encodeURIComponent(JSON.stringify({nm,brand,u:"g",p:prot,g:carb,l:fat,kc:kcal,src:"off"}));
      return `<div class="fri" onclick="selOFF('${enc}')">
        <div style="flex:1"><div class="fn">${nm}<span class="src">OFF</span></div>${brand?`<div class="fb">${brand}</div>`:""}</div>
        <div class="fm">${prot}g P · ${kcal}kc<br>/100g</div>
      </div>`;
    }).filter(Boolean).join("");
  }catch(e){if(document.getElementById("fres"))document.getElementById("fres").innerHTML=`<div style="text-align:center;padding:12px;color:var(--muted);font-size:11px">⚠️ Pas de connexion — utilise la base locale</div>`;}
}

function buildWB(){
  // Sheet 1: Séances
  const s1=[["Semaine","Jour","Séance","Exercice","Série","Kg","Reps","Terminé","Note"]];
  for(let w=1;w<=26;w++){
    const wk=DB.tr[w];if(!wk)continue;
    SESS.forEach(se=>{
      const sd=wk[se.id];if(!sd)return;
      BEX[se.id].forEach((b,ei)=>{
        const d=sd[ei];if(!d)return;
        d.sets.forEach((st,si)=>{
          s1.push(["S"+w,se.dy,se.nm,d.nm,si+1,st.kg||"",st.reps||"",d.done?"Oui":"Non",si===0?(d.note||""):""]);
        });
      });
    });
  }
  // Sheet 2: Corps
  const s2=[["Date","Poids kg","Bras cm","Poitrine cm","Taille cm","Cuisse cm","Sommeil h"]];
  (DB.body||[]).forEach(e=>s2.push([e.date,e.poids||"",e.bras||"",e.poitrine||"",e.taille||"",e.cuisse||"",e.sleep||""]));
  // Sheet 3: Nutrition
  const s3=[["Date","Aliment","Quantité","Unité","Protéines g","Glucides g","Lipides g","Kcal"]];
  Object.entries(DB.nlog||{}).forEach(([dt,log])=>{(log||[]).forEach(e=>s3.push([dt,e.nm,e.qty,e.u,+(e.p).toFixed(1),+(e.g).toFixed(1),+(e.l).toFixed(1),Math.round(e.kc)]));});
  // Sheet 4: Records
  const s4=[["Exercice","Record kg"]];
  getPRs().forEach(pr=>s4.push([pr.nm,pr.kg]));
  return [{nm:"Séances",rows:s1},{nm:"Corps",rows:s2},{nm:"Nutrition",rows:s3},{nm:"Records",rows:s4}];
}
function dlXLSX(sheets,fn){
  const enc=new TextEncoder();
  const strs=[],sm={};
  function si(v){const s=String(v==null?"":v);if(sm[s]===undefined){sm[s]=strs.length;strs.push(s);}return sm[s];}
  const shXMLs=sheets.map(sh=>{
    let x='<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
    sh.rows.forEach((row,ri)=>{
      x+=`<row r="${ri+1}">`;
      row.forEach((cell,ci)=>{
        const col=ci<26?String.fromCharCode(65+ci):(String.fromCharCode(64+Math.floor(ci/26))+String.fromCharCode(65+(ci%26)));
        const ref=`${col}${ri+1}`;
        const v=cell==null?"":cell;
        if(typeof v==="number"&&!isNaN(v)&&v!=="")x+=`<c r="${ref}"><v>${v}</v></c>`;
        else x+=`<c r="${ref}" t="s"><v>${si(v)}</v></c>`;
      });
      x+="</row>";
    });
    x+="</sheetData></worksheet>";
    return x;
  });
  let ss='<?xml version="1.0" encoding="UTF-8"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">';
  strs.forEach(s=>{ss+=`<si><t xml:space="preserve">${String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</t></si>`;});
  ss+="</sst>";
  const wbX=`<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>${sheets.map((s,i)=>`<sheet name="${s.nm}" sheetId="${i+1}" r:id="rId${i+2}"/>`).join("")}</sheets></workbook>`;
  const relX=`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>${sheets.map((_,i)=>`<Relationship Id="rId${i+2}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`).join("")}</Relationships>`;
  const ctX=`<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>${sheets.map((_,i)=>`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join("")}</Types>`;
  const rootR='<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  const files=[
    {n:"[Content_Types].xml",d:enc.encode(ctX)},
    {n:"_rels/.rels",d:enc.encode(rootR)},
    {n:"xl/workbook.xml",d:enc.encode(wbX)},
    {n:"xl/_rels/workbook.xml.rels",d:enc.encode(relX)},
    {n:"xl/sharedStrings.xml",d:enc.encode(ss)},
    ...shXMLs.map((x,i)=>({n:`xl/worksheets/sheet${i+1}.xml`,d:enc.encode(x)})),
  ];
  const zip=mkZip(files);
  const blob=new Blob([zip],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=fn;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}
function mkZip(files){
  const parts=[],cdir=[];let off=0;
  function crc(d){
    let c=0xFFFFFFFF;
    const T=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let v=i;for(let j=0;j<8;j++)v=(v&1)?0xEDB88320^(v>>>1):(v>>>1);t[i]=v;}return t;})();
    for(let i=0;i<d.length;i++)c=T[(c^d[i])&0xFF]^(c>>>8);
    return(c^0xFFFFFFFF)>>>0;
  }
  const enc=new TextEncoder();
  files.forEach(({n,d})=>{
    const nb=enc.encode(n),cr=crc(d);
    const loc=new Uint8Array(30+nb.length+d.length);
    const dv=new DataView(loc.buffer);
    dv.setUint32(0,0x04034b50,true);dv.setUint16(4,20,true);dv.setUint16(6,0,true);dv.setUint16(8,0,true);
    dv.setUint16(10,0,true);dv.setUint16(12,0,true);dv.setUint32(14,cr,true);
    dv.setUint32(18,d.length,true);dv.setUint32(22,d.length,true);dv.setUint16(26,nb.length,true);dv.setUint16(28,0,true);
    loc.set(nb,30);loc.set(d,30+nb.length);parts.push(loc);
    const cd=new Uint8Array(46+nb.length);const cv=new DataView(cd.buffer);
    cv.setUint32(0,0x02014b50,true);cv.setUint16(4,20,true);cv.setUint16(6,20,true);
    cv.setUint16(8,0,true);cv.setUint16(10,0,true);cv.setUint16(12,0,true);cv.setUint16(14,0,true);
    cv.setUint32(16,cr,true);cv.setUint32(20,d.length,true);cv.setUint32(24,d.length,true);
    cv.setUint16(28,nb.length,true);cv.setUint16(30,0,true);cv.setUint16(32,0,true);
    cv.setUint16(34,0,true);cv.setUint16(36,0,true);cv.setUint32(38,0,true);cv.setUint32(42,off,true);
    cd.set(nb,46);cdir.push(cd);off+=loc.length;
  });
  const cdsz=cdir.reduce((a,b)=>a+b.length,0);
  const eocd=new Uint8Array(22);const ev=new DataView(eocd.buffer);
  ev.setUint32(0,0x06054b50,true);ev.setUint16(4,0,true);ev.setUint16(6,0,true);
  ev.setUint16(8,files.length,true);ev.setUint16(10,files.length,true);
  ev.setUint32(12,cdsz,true);ev.setUint32(16,off,true);ev.setUint16(20,0,true);
  const tot=[...parts,...cdir,eocd].reduce((a,b)=>a+b.length,0);
  const out=new Uint8Array(tot);let pos=0;
  [...parts,...cdir,eocd].forEach(b=>{out.set(b,pos);pos+=b.length;});
  return out;
}

function conf(n){
