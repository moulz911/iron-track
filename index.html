<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>💪 IRON TRACK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;--s1:#111116;--s2:#18181f;--s3:#22222c;
  --border:#2c2c3a;--accent:#c8ff00;--red:#ff3d5a;--blue:#3eb8ff;
  --gold:#ffb800;--green:#00e676;--purple:#b57bee;
  --push-a:#ff5c5c;--pull-a:#3eb8ff;--legs:#ffc300;--push-b:#ff8c42;--pull-b:#4dd68c;
  --text:#eeeef5;--muted:#666680;--muted2:#44444e;--r:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.view{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:84px}
.view::-webkit-scrollbar{display:none}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,12,.97);
  backdrop-filter:blur(16px);border-top:1px solid var(--border);
  display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;
  border:none;background:none;cursor:pointer;color:var(--muted);font-size:9px;font-weight:700;
  letter-spacing:.8px;font-family:'DM Sans';text-transform:uppercase;transition:color .2s}
.nav-btn .ico{font-size:20px;line-height:1}
.nav-btn.active{color:var(--accent)}
/* SHARED */
.ph{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.pt{font-family:'Bebas Neue';font-size:30px;letter-spacing:2px;color:var(--accent);line-height:1}
.ps2{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.slbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:16px 20px 8px}
.btn{padding:13px 20px;border-radius:12px;border:none;font-size:14px;font-weight:700;
  font-family:'DM Sans';cursor:pointer;transition:all .18s;display:block;width:100%}
.bta{background:var(--accent);color:#000}.bta:active{transform:scale(.97)}
input,textarea{font-family:'DM Sans';background:var(--s2);border:1.5px solid var(--border);
  color:var(--text);border-radius:10px;font-size:14px;padding:10px 12px;width:100%}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
input[type=number]{-webkit-appearance:none;-moz-appearance:textfield}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .25s ease both}
/* DASH */
.hero{margin:16px 20px 0;border-radius:var(--r);background:linear-gradient(135deg,#1a2a00,#0a1800);
  border:1.5px solid #c8ff0033;padding:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,#c8ff0015,transparent 60%)}
.pb-bg{height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--accent),#80ff00);border-radius:3px;transition:width .6s}
.pb-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px}
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 20px 0}
.sb{background:var(--s1);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center}
.sb .sv{font-family:'Bebas Neue';font-size:28px;color:var(--accent);line-height:1}
.sb .sl{font-size:10px;color:var(--muted);font-weight:700;margin-top:2px}
/* TRAIN */
.wscr{display:flex;gap:6px;overflow-x:auto;padding:12px 20px;scrollbar-width:none}
.wscr::-webkit-scrollbar{display:none}
.wk{flex-shrink:0;width:44px;height:44px;border-radius:11px;border:1.5px solid var(--border);
  background:var(--s1);color:var(--muted);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative}
.wk.active{background:var(--accent);border-color:var(--accent);color:#000;transform:scale(1.08)}
.wk.curr::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--red)}
.wk.hd{border-color:#c8ff0066;color:var(--accent)}
.wk.hd.active{color:#000}
.stabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:0 20px}
.stab{padding:9px 4px;border-radius:11px;border:1.5px solid var(--border);background:var(--s1);
  font-size:10px;font-weight:700;cursor:pointer;text-align:center;color:var(--muted);transition:all .15s}
.stab .dot{width:7px;height:7px;border-radius:50%;background:var(--c,var(--muted));margin:0 auto 4px}
.stab.active{background:var(--c);border-color:var(--c);color:#000}
.stab.locked{opacity:.25;pointer-events:none}
/* EX CARDS */
.exlist{padding:12px 20px 0;display:flex;flex-direction:column;gap:10px}
.excard{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.excard.done{border-color:#00e67644;opacity:.85}
.excard.open{border-color:var(--accent)}
.exhead{padding:13px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none}
.exnum{width:26px;height:26px;border-radius:7px;background:var(--s3);display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;margin-top:1px}
.done .exnum{background:var(--green);color:#000}
.exinfo{flex:1;min-width:0}
.exname{font-size:14px;font-weight:700;line-height:1.2}
.exmeta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.excol{text-align:right;flex-shrink:0;min-width:70px}
.exbody{display:none;padding:0 14px 14px}
.excard.open .exbody{display:block}

/* GIF SECTION — animated exercise */
.gifwrap{margin-bottom:10px;border-radius:12px;overflow:hidden;background:var(--s2);
  border:1px solid var(--border);min-height:140px;display:flex;align-items:center;justify-content:center;position:relative}
.gifwrap img{width:100%;display:block;max-height:220px;object-fit:contain;background:#000}
.gif-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.gif-loader .spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.gif-loader p{font-size:11px;color:var(--muted)}
.mbadges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.mb{padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700}
.mb.p{background:#c8ff0018;color:var(--accent);border:1px solid #c8ff0030}
.mb.s{background:var(--s3);color:var(--muted)}

.renrow{display:flex;gap:6px;margin-bottom:10px}
.renrow input{flex:1;font-size:13px;padding:8px 10px}
.renrow button{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--s3);color:var(--accent);cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap}
.padv{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;gap:10px;font-size:12px;color:var(--muted)}
.padv strong{color:var(--text);display:block;font-size:13px;margin-bottom:2px}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:10px}
@media(min-width:380px){.sgrid{grid-template-columns:repeat(4,1fr)}}
.sbox{background:var(--s2);border:1.5px solid var(--border);border-radius:10px;padding:8px 5px;text-align:center;transition:border-color .2s}
.sbox.sd{border-color:#00e67666;background:#00e67608}
.sbox label{font-size:9px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px}
.srow{display:flex;gap:3px}
.srow input{background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:13px;font-weight:700;text-align:center;padding:6px 2px}
.srow input:focus{border-color:var(--accent)}
.slbls{font-size:9px;color:var(--muted2);display:flex;gap:3px;margin-top:3px}
.slbls span{flex:1;text-align:center}
.notea{width:100%;resize:none;height:46px;font-size:12px;margin-bottom:10px;background:var(--bg)}
.dtog{width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:var(--s2);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans';text-align:center}
.dtog.done{background:#00e67618;border-color:#00e67666;color:var(--green)}
/* CORPS */
.bform{margin:12px 20px 0;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:16px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fr.c3{grid-template-columns:1fr 1fr 1fr}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.bts{margin:12px 20px 0;overflow-x:auto}
.btbl{border-collapse:collapse;width:100%;min-width:460px}
.btbl th{background:var(--s2);padding:8px 10px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;text-align:center;border-bottom:1px solid var(--border)}
.btbl td{padding:8px 10px;font-size:12px;text-align:center;border-bottom:1px solid var(--s2)}
.btbl tr:nth-child(even) td{background:var(--s1)}
.dp{color:var(--green);font-weight:700}.dn{color:var(--red);font-weight:700}.dz{color:var(--muted)}
/* NUTRITION */
.dtog2{display:flex;gap:8px;padding:12px 20px 0}
.dtog2 button{flex:1;padding:10px;border-radius:11px;border:1.5px solid var(--border);background:var(--s1);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans';transition:all .15s}
.dtog2 button.active{background:var(--accent);border-color:var(--accent);color:#000}
.mbars{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 20px 0}
.mbar{background:var(--s1);border:1.5px solid var(--border);border-radius:13px;padding:10px 6px;text-align:center}
.mbar .mv{font-family:'Bebas Neue';font-size:18px;line-height:1}
.mbar .ml{font-size:9px;font-weight:700;color:var(--muted);margin-top:2px}
.mbar .mpb{height:3px;border-radius:2px;background:var(--s3);margin-top:5px;overflow:hidden}
.mbar .mpf{height:100%;border-radius:2px;transition:width .4s}

/* FOOD SEARCH — Open Food Facts */
.fbuilder{margin:12px 20px 0;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:16px}
.fsw{position:relative;margin-bottom:10px}
.fsw input{padding-right:80px}
.fsw .fsc{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}
.fsw .loading-dot{position:absolute;right:40px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  animation:pulse 1s ease-in-out infinite;display:none}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

.fres{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fres::-webkit-scrollbar{width:3px}
.fres::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.fri{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--s2);
  border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:border-color .15s}
.fri:active{border-color:var(--accent)}
.fri .fn{flex:1;font-size:13px;font-weight:600;line-height:1.3}
.fri .fb{font-size:10px;color:var(--muted);margin-top:2px}
.fri .fm{font-size:11px;color:var(--muted);text-align:right;line-height:1.5;flex-shrink:0}

/* source badge */
.src-off{font-size:9px;padding:2px 6px;border-radius:99px;background:#ff571522;color:#ff8844;border:1px solid #ff571533;font-weight:700;margin-left:6px}
.src-loc{font-size:9px;padding:2px 6px;border-radius:99px;background:#c8ff0015;color:var(--accent);border:1px solid #c8ff0030;font-weight:700;margin-left:6px}

.afform{background:var(--s2);border:1px solid var(--accent);border-radius:10px;padding:12px;margin-bottom:10px}
.afname{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px}
.afmeta{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.afrow{display:flex;align-items:center;gap:8px}
.afrow input{flex:1;padding:8px 10px;font-size:14px}
.afrow .afu{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.afrow button{padding:9px 14px;border-radius:8px;border:none;background:var(--accent);color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans';white-space:nowrap}

.qrow{display:flex;gap:6px;flex-wrap:wrap}
.qchip{padding:6px 11px;border-radius:99px;border:1px solid var(--border);background:var(--s2);
  color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:border-color .15s}
.qchip:active{border-color:var(--accent);color:var(--accent)}

.mlog{margin:12px 20px 0;display:flex;flex-direction:column;gap:7px}
.mli{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border:1.5px solid var(--border);border-radius:12px}
.mli .mn{flex:1;font-size:13px;font-weight:600}
.mli .mq{font-size:12px;color:var(--muted);margin-right:4px}
.mli .mm{text-align:right;font-size:11px;line-height:1.5}
.mli .md{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0}

.suplist{padding:0 20px;display:flex;flex-direction:column;gap:8px}
.supitem{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s1);border:1.5px solid var(--border);border-radius:12px}
.supitem .si{font-size:22px}
.supitem .sinf{flex:1}
.supitem .sinf strong{font-size:13px;font-weight:700}
.supitem .sinf span{font-size:11px;color:var(--muted);display:block;margin-top:1px}
.supitem .sd{font-size:12px;font-weight:700;color:var(--accent)}

.est{text-align:center;padding:40px 20px;color:var(--muted)}
.est .ei{font-size:40px;margin-bottom:10px}
.est p{font-size:13px;line-height:1.7}
#cl{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.cp{position:absolute;border-radius:2px;animation:cf 1.2s ease-in forwards}
@keyframes cf{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s2);border:1.5px solid var(--border);border-radius:12px;padding:10px 18px;
  font-size:13px;font-weight:700;z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ncard{margin:12px 20px 0;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:16px}
.rrow{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--s1);border:1.5px solid var(--border);border-radius:12px}
</style>
</head>
<body>
<div id="cl"></div>
<div class="toast" id="toast"></div>
<div class="app">
  <div class="view" id="view"></div>
  <nav class="nav">
    <button class="nav-btn active" data-page="dashboard" onclick="goPage('dashboard')"><span class="ico">📊</span>BILAN</button>
    <button class="nav-btn" data-page="train" onclick="goPage('train')"><span class="ico">🏋️</span>SÉANCE</button>
    <button class="nav-btn" data-page="body" onclick="goPage('body')"><span class="ico">📏</span>CORPS</button>
    <button class="nav-btn" data-page="nutrition" onclick="goPage('nutrition')"><span class="ico">🍽️</span>NUTRI</button>
  </nav>
</div>

<script>
// ═══ CONSTANTS ═══
const START=new Date(2026,2,23);
const PHASES=[
  {r:[1,2],label:"Phase 1 — Réadaptation",color:"#ff6b35",short:"PH1"},
  {r:[3,6],label:"Phase 2 — Montée en charge",color:"#ffb800",short:"PH2"},
  {r:[7,12],label:"Phase 3 — Volume maximum",color:"#00c853",short:"PH3"},
  {r:[13,18],label:"Phase 4 — Force + Sèche",color:"#2196f3",short:"PH4"},
  {r:[19,26],label:"Phase 5 — Peak",color:"#e94560",short:"PH5"},
];
const SESS=[
  {id:"push-a",name:"PUSH A",emoji:"💥",color:"var(--push-a)",muscles:"Pecto · Épaules · Triceps"},
  {id:"pull-a",name:"PULL A",emoji:"🎯",color:"var(--pull-a)",muscles:"Dos · Biceps"},
  {id:"legs",  name:"LEGS", emoji:"⚡",color:"var(--legs)",  muscles:"Cuisses · Ischios · Mollets"},
  {id:"push-b",name:"PUSH B",emoji:"🔥",color:"var(--push-b)",muscles:"Épaules · Pecto · Triceps"},
  {id:"pull-b",name:"PULL B",emoji:"💪",color:"var(--pull-b)",muscles:"Dos · Biceps · Trapèzes"},
];

// Exercise animated GIFs — from public Wikimedia / open gym sources
// Using ExerciseDB / public domain exercise illustrations
const EXINFO={
  "Développé couché barre":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Bench_press_animated.gif/320px-Bench_press_animated.gif",p:["Pectoraux"],s:["Triceps","Épaules ant."]},
  "Développé incliné haltères":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Incline_dumbbell_press_animation.gif/320px-Incline_dumbbell_press_animation.gif",p:["Pectoraux sup."],s:["Triceps"]},
  "Élévations latérales":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Lateral_raise_animation.gif/320px-Lateral_raise_animation.gif",p:["Deltoïdes lat."],s:["Trapèzes"]},
  "Dips lestés":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Dips_animation.gif/320px-Dips_animation.gif",p:["Pectoraux","Triceps"],s:["Épaules"]},
  "Extensions triceps poulie":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Triceps_pushdown_animation.gif/320px-Triceps_pushdown_animation.gif",p:["Triceps"],s:[]},
  "Tractions lestées":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Pull_up_animation.gif/320px-Pull_up_animation.gif",p:["Grand dorsal"],s:["Biceps","Rhomboïdes"]},
  "Rowing barre":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Bent_over_row_animation.gif/320px-Bent_over_row_animation.gif",p:["Grand dorsal"],s:["Biceps","Trapèzes"]},
  "Tirage horizontal câble":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Seated_cable_row_animation.gif/320px-Seated_cable_row_animation.gif",p:["Grand dorsal","Rhomboïdes"],s:["Biceps"]},
  "Curl barre":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Barbell_curl_animation.gif/320px-Barbell_curl_animation.gif",p:["Biceps"],s:["Avant-bras"]},
  "Curl marteau haltères":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Hammer_curl_animation.gif/320px-Hammer_curl_animation.gif",p:["Brachio-radial"],s:["Biceps"]},
  "Squat barre":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Squat_animation.gif/320px-Squat_animation.gif",p:["Quadriceps","Fessiers"],s:["Ischios","Lombaires"]},
  "Leg press":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Leg_press_animation.gif/320px-Leg_press_animation.gif",p:["Quadriceps"],s:["Fessiers"]},
  "Fentes haltères":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Dumbbell_lunge_animation.gif/320px-Dumbbell_lunge_animation.gif",p:["Quadriceps","Fessiers"],s:["Ischios"]},
  "Leg curl couché":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Lying_leg_curl_animation.gif/320px-Lying_leg_curl_animation.gif",p:["Ischios"],s:["Mollets"]},
  "Mollets debout":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Standing_calf_raise_animation.gif/320px-Standing_calf_raise_animation.gif",p:["Gastrocnémiens"],s:["Soléaire"]},
  "Développé militaire barre":{gif:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Overhead_press_animation.gif/320px-Overhead_press_animation.gif",p:["Deltoïdes"],s:["Triceps","Trapèzes"]},

function getCW(){return Math.max(1,Math.min(26,Math.floor((new Date()-START)/(7*864e5))+1));}
function getWD(w){return new Date(START.getTime()+(w-1)*7*864e5).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
function getPh(w){return PHASES.find(p=>w>=p.r[0]&&w<=p.r[1])||PHASES[0];}
function is5(w){return w%2===1;}

function getCharge(sid,ei,week){
  const base=BEX[sid][ei];
  if(base.bw||week===1)return null;
  const w1max=getMaxKg(sid,ei,1);
  if(w1max){
    const m=week<=2?1:week<=6?1.05:week<=12?1.125:week<=18?1.20:1.30;
    return Math.round(w1max*m/2.5)*2.5;
  }
  const fm=week<=2?.8:week<=6?1:week<=12?1.1:week<=18?1.175:1.25;
  return Math.round(base.base*fm/2.5)*2.5;
}
function getMaxKg(sid,ei,week){
  const d=(DB.train[week]||{})[sid];
  if(!d||!d[ei])return null;
  const v=d[ei].sets.map(s=>parseFloat(s.kg)).filter(k=>!isNaN(k)&&k>0);
  return v.length?Math.max(...v):null;
}
function getHistMax(sid,ei,upTo){
  let best=null;
  for(let w=1;w<upTo;w++){const m=getMaxKg(sid,ei,w);if(m&&(best===null||m>best))best=m;}
  return best;
}
function getExD(w,s,i){
  if(!DB.train[w])DB.train[w]={};
  if(!DB.train[w][s])DB.train[w][s]={};
  const b=BEX[s][i];
  if(!DB.train[w][s][i])DB.train[w][s][i]={name:b.name,sets:Array.from({length:b.s},()=>({kg:"",reps:""})),done:false,note:""};
  return DB.train[w][s][i];
}
function getSessDone(w,s){return BEX[s].every((_,i)=>DB.train[w]?.[s]?.[i]?.done);}
function countSess(){return Object.values(DB.train||{}).reduce((a,wk)=>a+SESS.filter(s=>sdwk(wk,s.id)).length,0);}
function sdwk(wk,sid){if(!wk||!wk[sid])return false;return BEX[sid].every((_,i)=>wk[sid][i]?.done);}
function getPRs(){
  const prs=[];
  SESS.forEach(se=>{BEX[se.id].forEach((ex,i)=>{
    const m=getHistMax(se.id,i,27);
    if(m){const nm=getExD(getCW(),se.id,i).name;prs.push({name:nm,kg:m});}
  });});
  return prs.sort((a,b)=>b.kg-a.kg).slice(0,6);
}

async function searchOFF(query){
  if(!query||query.length<2)return[];
  try{
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=15&fields=product_name,brands,nutriments,serving_size&cc=fr&lc=fr`;
    const resp=await fetch(url);
    if(!resp.ok)return[];
    const data=await resp.json();
    return (data.products||[]).filter(p=>{
      const n=p.nutriments;
      return p.product_name && n && n.proteins_100g!==undefined && n.energy-kcal_100g!==undefined;
    }).map(p=>{
      const n=p.nutriments;
      return{
        id:'off-'+Math.random().toString(36).slice(2),
        name:p.product_name,
        brand:p.brands||'',
        unit:'g',
        p:Math.round(n.proteins_100g*10)/10||0,
        g:Math.round(n.carbohydrates_100g*10)/10||0,
        l:Math.round(n.fat_100g*10)/10||0,
        kc:Math.round(n['energy-kcal_100g']||n.energy_100g/4.184||0),
        source:'off',
      };
    }).filter(f=>f.kc>0).slice(0,12);
  }catch(e){return[];}
}

function searchLocal(q){
  if(!q)return LOCAL_FOODS.slice(0,8);
  const lq=q.toLowerCase();
  return LOCAL_FOODS.filter(f=>f.name.toLowerCase().includes(lq)).slice(0,8);
}

    const diff=(charge-prevBest).toFixed(1);
    if(parseFloat(diff)>0)adv=`<div class="padv"><div style="font-size:16px">🚀</div><div><strong>+${diff}kg vs ton record</strong>Objectif ambitieux — bonne technique avant tout.</div></div>`;

  }

  // GIF with lazy load & fallback
  let gifH='';
  if(info){
    const gifUrl=info.gif;
    const pNames=info.p.map(m=>`<span class="mb p">${m}</span>`).join('');
    const sNames=info.s.map(m=>`<span class="mb s">${m}</span>`).join('');
    gifH=`<div class="gifwrap" id="gw-${i}">
      <div class="gif-loader" id="gl-${i}"><div class="spin"></div><p>Chargement...</p></div>
      <img src="${gifUrl}" alt="${exd.name}" loading="lazy" style="display:none" id="gimg-${i}"
        onload="document.getElementById('gl-${i}').style.display='none';this.style.display='block'"
        onerror="document.getElementById('gw-${i}').innerHTML='<div style=\\'padding:14px;text-align:center\\'><div style=\\'font-size:32px;margin-bottom:4px\\'>💪</div><div style=\\'font-size:12px;color:var(--muted)\\'>${exd.name}</div></div>'">
    </div>
    <div class="mbadges">${pNames}${sNames}</div>`;
  }

  const card=document.createElement('div');
  card.className=`excard${exd.done?' done':''}`;
  card.id=`ec-${i}`;
  card.innerHTML=`
  <div class="exhead" onclick="toggleEx(${i})">
    <div class="exnum">${exd.done?'✓':i+1}</div>
    <div class="exinfo"><div class="exname">${exd.name}</div>
    <div class="exmeta"><span>📦 ${base.s} séries</span><span>🎯 ${base.r} reps</span></div></div>
    <div class="excol">${cdisp}</div>
  </div>
  <div class="exbody" id="eb-${i}">
    ${gifH}
    <div class="renrow"><input type="text" id="rn-${i}" value="${exd.name}" placeholder="Renommer"><button onclick="renEx(${i})">✓ OK</button></div>
    ${adv}
    <div class="sgrid">
      ${exd.sets.map((st,si)=>{
        const d=st.kg!==''&&st.reps!=='';
        return `<div class="sbox${d?' sd':''}" id="sb-${i}-${si}"><label>SÉRIE ${si+1}</label>
          <div class="srow">
            <input type="number" inputmode="decimal" placeholder="kg" value="${st.kg}" oninput="setV(${i},${si},'kg',this.value)">
            <input type="number" inputmode="numeric" placeholder="reps" value="${st.reps}" oninput="setV(${i},${si},'reps',this.value)">
          </div>
          <div class="slbls"><span>kg</span><span>reps</span></div>
        </div>`;
      }).join('')}
    </div>
    <textarea class="notea" placeholder="Notes, substitution, ressenti..." onchange="setNote(${i},this.value)">${exd.note}</textarea>
    <button class="dtog${exd.done?' done':''}" id="dt-${i}" onclick="togDone(${i})">${exd.done?'✅ Terminé — touche pour annuler':'Marquer comme terminé'}</button>
  </div>`;
  if(replace){const old=document.getElementById(`ec-${i}`);if(old)old.replaceWith(card);}
  else container.appendChild(card);
}

function toggleEx(i){const b=document.getElementById(`eb-${i}`);if(!b)return;const o=b.style.display==='block';b.style.display=o?'none':'block';document.getElementById(`ec-${i}`)?.classList.toggle('open',!o);}
function renEx(i){const inp=document.getElementById(`rn-${i}`);if(!inp||!inp.value.trim())return;getExD(tW,tS,i).name=inp.value.trim();saveDB();document.querySelector(`#ec-${i} .exname`).textContent=inp.value.trim();showToast('✓ Renommé');}
function setV(i,si,field,val){const d=getExD(tW,tS,i);d.sets[si]=d.sets[si]||{kg:'',reps:''};d.sets[si][field]=val;saveDB();const st=d.sets[si];const sb=document.getElementById(`sb-${i}-${si}`);if(sb)sb.className='sbox'+(st.kg!==''&&st.reps!==''?' sd':'');}
function setNote(i,val){getExD(tW,tS,i).note=val;saveDB();}
function togDone(i){
  const d=getExD(tW,tS,i);d.done=!d.done;saveDB();
  const card=document.getElementById(`ec-${i}`);const body=document.getElementById(`eb-${i}`);const btn=document.getElementById(`dt-${i}`);
  card.classList.toggle('done',d.done);card.classList.remove('open');
  if(d.done){body.style.display='none';spawnConf(5);}
  btn.className='dtog'+(d.done?' done':'');
  btn.textContent=d.done?'✅ Terminé — touche pour annuler':'Marquer comme terminé';
  card.querySelector('.exnum').textContent=d.done?'✓':i+1;
  const exs=BEX[tS];const n=exs.filter((_,idx)=>getExD(tW,tS,idx).done).length;const pct=Math.round(n/exs.length*100);
  const pf=document.getElementById('pf');if(pf)pf.style.width=pct+'%';
  document.getElementById('pl').textContent=`${n}/${exs.length} exercices`;document.getElementById('pp').textContent=pct+'%';
  if(n===exs.length)setTimeout(()=>{spawnConf(40);showToast('🎉 Séance terminée !');},300);
}

    <div class="fr" style="margin-bottom:12px"><div class="ff"><label>Cuisse (cm)</label><input type="number" id="bc" placeholder="58"></div><div class="ff"><label>Sommeil (h)</label><input type="number" inputmode="decimal" id="bsl" placeholder="7.5"></div></div>

    ${[...DB.body].reverse().map((e,ri,arr)=>{
      const prev=arr[ri+1];const dv=prev?((e.poids||0)-(prev.poids||0)).toFixed(1):null;

function saveBody(){
  const g=id=>document.getElementById(id)?.value;
  const e={date:g('bd'),poids:parseFloat(g('bp'))||null,bras:parseFloat(g('bb'))||null,poitrine:parseFloat(g('bpo'))||null,taille:parseFloat(g('bt'))||null,cuisse:parseFloat(g('bc'))||null,sleep:parseFloat(g('bsl'))||null};

  if(!DB.body)DB.body=[];DB.body.push(e);saveDB();showToast('✅ Mesure enregistrée !');renderPage();
}

// ═══ NUTRITION ═══
function todayK(){return new Date().toLocaleDateString('fr-FR');}
function getLog(){if(!DB.nlog)DB.nlog={};if(!DB.nlog[todayK()])DB.nlog[todayK()]=[];return DB.nlog[todayK()];}
function sumLog(log){let p=0,g=0,l=0,kc=0;log.forEach(e=>{p+=e.p;g+=e.g;l+=e.l;kc+=e.kc;});return{p:Math.round(p),g:Math.round(g),l:Math.round(l),kc:Math.round(kc)};}

  </div>

  <div class="fbuilder fu">
    <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px">➕ Ajouter un aliment</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px">

      ${localR.map(f=>`<div class="fri" onclick="selF(null,'${f.id}')">
        <div><div class="fn">${f.name}<span class="src-loc">LOCAL</span></div><div class="fb">${f.cat}</div></div>

    ${fSearch?`

      OPEN FOOD FACTS <span style="background:#ff571522;color:#ff8844;border:1px solid #ff571533;padding:2px 6px;border-radius:99px;font-size:9px">OFF</span>
    </div>
    <div class="fres" id="fres">
      <div style="text-align:center;padding:14px;color:var(--muted);font-size:12px" id="fres-status">
        <div style="display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px"></div>

        .map(n=>{const f=LOCAL_FOODS.find(x=>x.name===n);return f?`<div class="qchip" onclick="selF(null,'${f.id}')">${n}</div>`:''}).join('')}

      <div class="mq">${e.qty}${e.unit}</div>

  <div class="slbl">💊 Suppléments</div>
  <div class="suplist fu">
    ${[{i:"⚡",n:"Créatine monohydrate",d:"5g/jour",s:"Toujours · Le plus efficace"},
       {i:"🥛",n:"Whey protéine",d:"1-2 scoops",s:"Post-séance si manque protéines"},
       {i:"☀️",n:"Vitamine D3",d:"3000 UI/jour",s:"Matin avec repas gras · Oct-Avril"},

  // Trigger OFF search if query exists
  if(fSearch&&fSearch.length>=2){

async function doOFFSearch(query){
  const container=document.getElementById('fres');
  if(!container)return;
  try{
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=20&fields=product_name,brands,nutriments,quantity&cc=fr&lc=fr`;
    const resp=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!resp.ok)throw new Error('Network error');
    const data=await resp.json();
    const products=(data.products||[]).filter(p=>{
      const n=p.nutriments;
      return p.product_name&&n&&n.proteins_100g!==undefined&&(n['energy-kcal_100g']!==undefined||n.energy_100g!==undefined);
    });
    if(!container)return;
    if(products.length===0){
      container.innerHTML=`<div style="text-align:center;padding:14px;color:var(--muted);font-size:12px">Aucun résultat sur Open Food Facts</div>`;
      return;
    }
    container.innerHTML=products.slice(0,12).map(p=>{
      const n=p.nutriments;
      const prot=Math.round((n.proteins_100g||0)*10)/10;
      const carb=Math.round((n.carbohydrates_100g||0)*10)/10;
      const fat=Math.round((n.fat_100g||0)*10)/10;
      const kcal=Math.round(n['energy-kcal_100g']||n.energy_100g/4.184||0);
      const brand=p.brands?p.brands.split(',')[0].trim():'';
      const foodObj=JSON.stringify({name:p.product_name,brand,unit:'g',p:prot,g:carb,l:fat,kc:kcal,source:'off'}).replace(/'/g,'&#39;');
      return `<div class="fri" onclick="selFOFF('${encodeURIComponent(JSON.stringify({name:p.product_name,brand,unit:'g',p:prot,g:carb,l:fat,kc:kcal,source:'off'}))}')">
        <div style="flex:1">
          <div class="fn">${p.product_name}<span class="src-off">OFF</span></div>
          ${brand?`<div class="fb">${brand}</div>`:''}
        </div>
        <div class="fm">${prot}g P · ${kcal} kcal<br><span style="font-size:10px;color:var(--muted2)">pour 100g</span></div>
      </div>`;
    }).join('');
  }catch(e){
    if(container)container.innerHTML=`<div style="text-align:center;padding:14px;color:var(--muted);font-size:12px">⚠️ Erreur de connexion — utilise la base locale</div>`;
  }
}

// Store temp OFF food for add form
let tempOFFFood=null;
function selFOFF(encoded){
  try{tempOFFFood=JSON.parse(decodeURIComponent(encoded));}catch(e){return;}
  selFood='__off__';fSearch='';
  rNutri(document.getElementById('view'));
  setTimeout(()=>{const inp=document.getElementById('fqty');if(inp)inp.focus();},80);
}
function selF(offData,localId){
  tempOFFFood=null;
  if(localId){selFood=localId;fSearch='';}
  rNutri(document.getElementById('view'));
  setTimeout(()=>{const inp=document.getElementById('fqty');if(inp)inp.focus();},80);
}

function mkAddForm(){
  let f;
  if(selFood==='__off__'&&tempOFFFood){f=tempOFFFood;}
  else{f=LOCAL_FOODS.find(x=>x.id===selFood);}
  if(!f)return'';
  const ip=f.unit==='pièce'||f.unit==='scoop';
  return `<div class="afform">
    <div class="afname">${f.name}${f.source==='off'?`<span class="src-off">OFF</span>`:''}${f.brand?`<span style="font-size:11px;color:var(--muted);font-weight:400"> · ${f.brand}</span>`:''}</div>
    <div class="afmeta">
      <span style="color:var(--blue)">${f.p}g prot</span> · <span style="color:var(--gold)">${f.g}g gluc</span> · <span style="color:var(--red)">${f.l}g lip</span> · <span style="color:var(--accent)">${f.kc} kcal</span>
      <span style="color:var(--muted)"> pour 100${f.unit==='ml'?'ml':'g'}</span>
    </div>
    <div class="afrow">
      <input type="number" inputmode="decimal" id="fqty" placeholder="${ip?'1':f.unit==='ml'?'200':'100'}" min="1">
      <span class="afu">${f.unit}</span>
      <button onclick="addF()">Ajouter ✓</button>
    </div>
  </div>`;
}

function onFS(val){
  fSearch=val;if(!val){selFood=null;tempOFFFood=null;}
  rNutri(document.getElementById('view'));
  setTimeout(()=>{const inp=document.getElementById('fsrch');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}},10);
}
function clrFS(){fSearch='';selFood=null;tempOFFFood=null;rNutri(document.getElementById('view'));}

function addF(){
  let f;
  if(selFood==='__off__'&&tempOFFFood){f=tempOFFFood;}
  else{f=LOCAL_FOODS.find(x=>x.id===selFood);}
  const qi=document.getElementById('fqty');
  if(!f||!qi)return;
  const qty=parseFloat(qi.value);
  if(!qty||qty<=0){showToast('⚠️ Renseigne une quantité');return;}
  const factor=(f.unit==='pièce'||f.unit==='scoop')?qty*(f.uw||1)/100:qty/100;
  getLog().push({name:f.name,unit:f.unit,qty,source:f.source||'local',p:f.p*factor,g:f.g*factor,l:f.l*factor,kc:f.kc*factor});
  saveDB();selFood=null;tempOFFFood=null;fSearch='';
  showToast(`✅ ${f.name} ajouté`);
  rNutri(document.getElementById('view'));
}
function rmFood(i){const log=getLog();log.splice(i,1);saveDB();rNutri(document.getElementById('view'));}

// ═══ UTILS ═══
let tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2200);}
function spawnConf(n){
  const layer=document.getElementById('cl');const cols=['#c8ff00','#ff3d5a','#3eb8ff','#ffb800','#00e676','#b57bee'];
  for(let i=0;i<n;i++){setTimeout(()=>{const p=document.createElement('div');p.className='cp';p.style.cssText=`left:${Math.random()*100}vw;top:-10px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.4}s;animation-duration:${.9+Math.random()*.7}s`;layer.appendChild(p);setTimeout(()=>p.remove(),1600);},i*35);}
}

renderPage();
setTimeout(()=>{const sc=document.querySelector('.wscr');if(sc){const a=sc.querySelector('.wk.active');if(a)a.scrollIntoView({inline:'center',block:'nearest'});}},80);
</script>
